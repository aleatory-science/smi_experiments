[flake8]
max-line-length = 120
exclude = venv/, .idea/, src/bifrost_ref.py, .data
ignore = W503,E203,E731

[isort]
profile = black
known_first_party = numpyro
known_jax = flax, haiku, jax, optax, tensorflow_probability
sections = FUTURE, STDLIB, THIRDPARTY, JAX, FIRSTPARTY, LOCALFOLDER
force_sort_within_sections = true
combine_as_imports = true
multi_line_output = 3